const GHL_WEBHOOK = "https://webhook.site/a3bae9e4-9dcc-4562-a3fa-5deb5d7fd5c4";

function getSP(t) {
  const o = ["Ordinary","Familiar","Borderland","Promised Land"];
  let b = "Ordinary", bv = -1;
  for (const l of o) { if ((t[l]||0) >= bv) { bv = t[l]||0; b = l; } }
  return b;
}
function getHB(s) {
  let b = "overworking", bv = -1;
  for (const [k,v] of Object.entries(s)) { if (v > bv) { bv = v; b = k; } }
  return b;
}
function getSecondaryHB(s, primary) {
  let b = null, bv = -1;
  for (const [k,v] of Object.entries(s)) { if (k !== primary && v > bv) { bv = v; b = k; } }
  return b;
}
async function sendToGHL({ firstName, lastName, email, phone, setPoint, hiddenBenefit, secondaryHiddenBenefit, incomeCeiling, moneyOnHand, incomeNext, annualCost, hbScores, nonMoney, patterns, northStar }) {
  try {
    const tags = [
      "KA-Assessment-Completed",
      `KA-SetPoint-${setPoint.replace(/ /g,"")}`,
      `KA-HB-${HB_NAME[hiddenBenefit].replace(/ /g,"")}`,
    ];
    const customFields = {
      set_point: setPoint,
      hidden_benefit: HB_NAME[hiddenBenefit],
      secondary_hidden_benefit: secondaryHiddenBenefit ? HB_NAME[secondaryHiddenBenefit] : "",
      monthly_income: incomeCeiling,
      money_on_hand: moneyOnHand,
      next_income_level: incomeNext,
      annual_cost: fmt(annualCost),
      decade_cost: fmt(annualCost * 10),
      real_reason: northStar,
      ease: nonMoney.ease || "",
      rest: nonMoney.rest || "",
      fulfillment: nonMoney.fulfillment || "",
      relational: nonMoney.relational || "",
      hb_score_overworking: (hbScores.overworking || 0) + "/15",
      hb_score_avoiding_judgment: (hbScores.avoiding_judgment || 0) + "/15",
      hb_score_seeking_validation: (hbScores.seeking_validation || 0) + "/15",
      hb_score_avoiding_responsibility: (hbScores.avoiding_responsibility || 0) + "/15",
      patterns: patterns.filter(p => !p.startsWith("N/A")).join(", "),
    };
    await fetch(GHL_WEBHOOK, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ firstName, lastName, email, phone, tags, customFields }),
    });
  } catch(e) { console.log("GHL error:", e); }
}

function MultiCat({ cats, onContinue }) {
  const catEntries = Object.entries(cats);
  const [step, setStep] = useState(0);
  const [selBycat, setSelBycat] = useState({});
  const [cat, items] = catEntries[step];
  const catSel = selBycat[cat] || [];
  const toggle = x => {
    const isNA = x.startsWith("N/A");
    setSelBycat(p => {
      const prev = p[cat] || [];
      let next;
      if (isNA) { next = prev.includes(x) ? [] : [x]; }
      else { const w = prev.filter(i => !i.startsWith("N/A")); next = w.includes(x) ? w.filter(i=>i!==x) : [...w,x]; }
      return {...p, [cat]: next};
    });
  };
  const isLast = step === catEntries.length - 1;
  const next = () => {
    if (isLast) { onContinue(catEntries.flatMap(([k]) => selBycat[k] || [])); }
    else { setStep(s => s+1); }
  };
  const regularItems = items.filter(i => !i.startsWith("N/A"));
  const naItem = items.find(i => i.startsWith("N/A"));
  return (
    <div className="multi">
      <div className="mcat">{cat}</div>
      <div className="mgrid">
        {regularItems.map(item => (
          <button key={item} className={`chk ${catSel.includes(item)?"on":""}`} onClick={()=>toggle(item)}>
            <div className="chkbox">{catSel.includes(item)?"✓":""}</div>{item}
          </button>
        ))}
        {naItem && <div><hr className="divider"/><button key={naItem} className={`chk na ${catSel.includes(naItem)?"on":""}`} onClick={()=>toggle(naItem)}><div className="chkbox">{catSel.includes(naItem)?"✓":""}</div>{naItem}</button></div>}
      </div>
      <div className="stepfoot">
        <span className="steplbl">{step+1} of {catEntries.length}</span>
        <button className="cont" style={{marginTop:0}} onClick={next}>{isLast ? "Continue →" : "Next →"}</button>
      </div>
    </div>
  );
}

function MultiFlatCat({ items, onContinue }) {
  const [sel, setSel] = useState([]);
  const toggle = x => setSel(p => p.includes(x) ? p.filter(i=>i!==x) : [...p,x]);
  return (
    <div className="multi">
      <div className="mgrid">
        {items.map(item => (
          <button key={item} className={`chk ${sel.includes(item)?"on":""}`} onClick={()=>toggle(item)}>
            <div className="chkbox">{sel.includes(item)?"✓":""}</div>{item}
          </button>
        ))}
      </div>
      <button className="cont" onClick={()=>onContinue(sel)}>Continue →</button>
    </div>
  );
}

}

      )}
      {phase==="prayer" && (
        <div className="prayer-btn">
          <button className="cont" style={{width:"100%",padding:"14px"}} onClick={handlePrayer}>I've prayed — Continue →</button>
        </div>
      )}
      {renderUI()}
      {showContact && <ContactForm onSubmit={handleContact} />}
      {showResults && (
        <Results
          name={contact ? `${contact.firstName} ${contact.lastName}` : name}
          tallies={tallies} hbScores={hbScores}
          incomeCeiling={incomeCeil} incomeNext={incNext}
          patterns={patterns} moneyOnHand={moneyHand}
          northStar={northStar} nonMoney={nonMoney} costItems={costItems}
        />
      )}
      <div ref={bottom} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
